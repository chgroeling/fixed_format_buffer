name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.compiler.name }} (${{ matrix.build_type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - name: gcc
            cc: gcc
            cxx: g++
          - name: clang
            cc: clang
            cxx: clang++
        build_type: [Debug, Release]

    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc g++ clang cmake ninja-build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: |
          pip install "conan>=2.0"
          conan --version

      - name: Detect Conan profile
        run: |
          conan profile detect --force
          conan profile show

      - name: Install dependencies
        run: |
          conan install . \
            --output-folder=build \
            --build=missing \
            -s build_type=${{ matrix.build_type }} \
            -s compiler.cppstd=17

      - name: Configure
        run: cmake --preset conan-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}

      - name: Build
        run: cmake --build --preset conan-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }}

      - name: Test
        run: ctest --preset conan-${{ matrix.build_type == 'Debug' && 'debug' || 'release' }} --output-on-failure
